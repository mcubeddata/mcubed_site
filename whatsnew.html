<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MCubed - What's New. View all app updates, new features, and improvements."
    />
    <title>What's New | MCubed</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">
          <img
            src="logo.png"
            alt="MCubed Logo"
            onerror="this.style.display = 'none'"
          />
          <span>MCubed</span>
        </a>
        <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links" id="navLinks">
          <a href="index.html#features">Features</a>
          <a href="index.html#marketplace">Marketplace</a>
          <a href="whatsnew.html" class="active">What's New</a>
          <a href="index.html#download" class="btn btn-primary">Download Now</a>
        </div>
      </div>
      <div class="nav-overlay" id="navOverlay"></div>
    </nav>

    <!-- Header -->
    <header class="hero-small">
      <div class="hero-content fade-in-up" style="text-align: center; padding: 60px 20px;">
        <h1>What's <span class="accent-text">New</span></h1>
        <p style="margin-top: 16px; font-size: 1.1rem; max-width: 600px; margin-left: auto; margin-right: auto;">
          Recent releases and improvements to the MCubed app
        </p>
      </div>
    </header>

    <!-- Release Notes Section -->
    <section class="section" style="max-width: 900px; margin: 0 auto; padding: 40px 20px;">
      <div id="changelog-list" class="changelog-list" style="gap: 1.5rem;">
        <div class="changelog-loading" style="text-align: center; padding: 40px;">
          <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary); margin-bottom: 16px;"></i>
          <p>Loading release notes...</p>
        </div>
      </div>

    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-content">
        <p>&copy; 2026 MCubed. All rights reserved.</p>
        <div class="footer-links">
          <a href="index.html">Home</a>
          <a href="index.html#features">Features</a>
          <a href="whatsnew.html">What's New</a>
          <a href="https://github.com/mcubeddata/mcubed_site" target="_blank">GitHub</a>
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
    <script>
      // Load and display release notes on this page
      document.addEventListener('DOMContentLoaded', () => {
        loadChangelog();
      });
    </script>
  </body>
</html>
